<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE082"/>
      <stop offset="1" stop-color="#FFAB91"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#sky-b)"/>
  <rect y="320" width="800" height="80" fill="#4E342E"/>
  <!-- Atomium-inspired spheres + connectors -->
  <g fill="#B0BEC5" stroke="#37474F" stroke-width="2">
    <line x1="400" y1="120" x2="400" y2="240" stroke-width="4"/>
    <line x1="320" y1="180" x2="480" y2="180" stroke-width="4"/>
    <line x1="340" y1="240" x2="460" y2="240" stroke-width="4"/>
    <line x1="340" y1="120" x2="460" y2="120" stroke-width="4"/>
    <circle cx="400" cy="80" r="32"/>
    <circle cx="320" cy="180" r="32"/>
    <circle cx="480" cy="180" r="32"/>
    <circle cx="340" cy="120" r="28"/>
    <circle cx="460" cy="120" r="28"/>
    <circle cx="340" cy="240" r="28"/>
    <circle cx="460" cy="240" r="28"/>
    <circle cx="400" cy="280" r="34"/>
  </g>
  <!-- Brussels horizon detail -->
  <g fill="#3E2723" opacity="0.7">
    <rect x="120" y="260" width="80" height="60"/>
    <polygon points="120,260 160,230 200,260"/>
    <rect x="600" y="270" width="100" height="50"/>
    <rect x="640" y="240" width="20" height="30"/>
  </g>
  <text x="40" y="60" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800">⚛️</text>
  <text x="720" y="60" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800">🇧🇪</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4B5E8"/>
      <stop offset="1" stop-color="#FFD89E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#sky-p)"/>
  <rect y="320" width="800" height="80" fill="#3F4B6E"/>
  <!-- Eiffel tower silhouette -->
  <g fill="#3F4B6E">
    <polygon points="380,80 420,80 410,140 390,140"/>
    <polygon points="390,140 410,140 415,200 385,200"/>
    <polygon points="385,200 415,200 425,260 375,260"/>
    <polygon points="375,260 425,260 445,320 355,320"/>
    <rect x="395" y="60" width="10" height="20"/>
    <line x1="385" y1="200" x2="415" y2="200" stroke="#3F4B6E" stroke-width="3"/>
    <line x1="375" y1="260" x2="425" y2="260" stroke="#3F4B6E" stroke-width="3"/>
  </g>
  <!-- Carrousel du Louvre arches -->
  <g fill="#D6B886" stroke="#8C7B5C" stroke-width="2">
    <rect x="150" y="250" width="100" height="70"/>
    <path d="M165,320 L165,280 Q185,260 205,280 L205,320 Z"/>
    <path d="M215,320 L215,280 Q235,260 255,280 L255,320 Z" transform="translate(-50,0)"/>
    <rect x="540" y="250" width="100" height="70"/>
    <path d="M555,320 L555,280 Q575,260 595,280 L595,320 Z"/>
  </g>
  <text x="40" y="60" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800">🗼</text>
  <text x="720" y="60" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800">🇫🇷</text>
</svg>
